name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone mettle
        run: |
          git clone https://github.com/jimporter/mettle.git /tmp/mettle
          git -C /tmp/mettle checkout c00953a8cad7dac67a291228fab84ae5033c6307

      - name: Build and run tests
        run: |
          c++ -std=c++20 \
            -Wall -Wextra -pedantic -Werror \
            -I include \
            -I /tmp/mettle/include \
            -DINC_METTLE_HPP \
            -include mettle/header_only.hpp \
            test/flags.cc \
            -o test_flags
          ./test_flags
